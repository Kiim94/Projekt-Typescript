<div class="content">

    <h1>Mitt ramschema</h1>
    <p>Totala högskolepoäng: {{ totalpoints() }}</p>
    <div class="tableWrap">
        <table class="table">
            <thead>
                <tr>
                <th (click)="sortBy('courseCode')">Kurskod <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#2f4f4f"><path d="M320-440v-287L217-624l-57-56 200-200 200 200-57 56-103-103v287h-80ZM600-80 400-280l57-56 103 103v-287h80v287l103-103 57 56L600-80Z"/></svg></th>
                <th (click)="sortBy('courseName')">Kursnamn <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#2f4f4f"><path d="M320-440v-287L217-624l-57-56 200-200 200 200-57 56-103-103v287h-80ZM600-80 400-280l57-56 103 103v-287h80v287l103-103 57 56L600-80Z"/></svg></th>
                <th (click)="sortBy('level')">Nivå <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#2f4f4f"><path d="M320-440v-287L217-624l-57-56 200-200 200 200-57 56-103-103v287h-80ZM600-80 400-280l57-56 103 103v-287h80v287l103-103 57 56L600-80Z"/></svg></th>
                <th (click)="sortBy('subject')">Ämne <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#2f4f4f"><path d="M320-440v-287L217-624l-57-56 200-200 200 200-57 56-103-103v287h-80ZM600-80 400-280l57-56 103 103v-287h80v287l103-103 57 56L600-80Z"/></svg></th>
                <th>Ta bort</th>
            </tr>
            </thead>
            <tbody>
            @for (course of sortCourses(); track course.courseCode){
                <tr>
                    <td>{{course.courseCode}}</td>
                    <td>{{course.courseName}}</td>
                    <td>{{course.level}}</td>
                    <td>{{course.points}}</td>
                    <td>{{course.subject}}</td>
                    <td><span class="remove" (click)="removeCourse(course.courseCode)">Ta bort</span></td>
                </tr>

            }
            </tbody>
        </table>
    </div>
</div>
